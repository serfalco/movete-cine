name: Test Cine

on:
  workflow_dispatch:

jobs:
  test-cine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar prueba local
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python main.py --output ./_salida_cine
