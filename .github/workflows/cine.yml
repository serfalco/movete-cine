name: MoVeTe Cine semanal

# Jueves 7:00 Argentina (UTC-3) = jueves 10:00 UTC
# Además se puede disparar a mano desde la pestaña Actions.
on:
  schedule:
    - cron: "0 10 * * 4"
  workflow_dispatch:

jobs:
  generar-y-publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Traer el repo
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Generar la cartelera de la semana
        run: python main.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      # --- Subida a Hostinger por FTP ---
      # El FTP de Hostinger a veces se cuelga (Timeout control socket).
      # Primer intento. Si falla, NO corta el workflow (continue-on-error)
      # y entra el segundo intento de abajo.
      - name: Subir a Hostinger por FTP (intento 1)
        id: ftp1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./cine/
          server-dir: ${{ secrets.FTP_REMOTE_CINE }}
          dangerous-clean-slate: false
          timeout: 60000

      # Espera 30s y reintenta SOLO si el intento 1 falló.
      - name: Esperar antes de reintentar
        if: steps.ftp1.outcome == 'failure'
        run: sleep 30

      - name: Subir a Hostinger por FTP (intento 2)
        if: steps.ftp1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./cine/
          server-dir: ${{ secrets.FTP_REMOTE_CINE }}
          dangerous-clean-slate: false
          timeout: 60000
