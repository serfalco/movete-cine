name: Diagnóstico fuentes cine

# Solo manual: pestaña Actions -> este workflow -> Run workflow
on:
  workflow_dispatch:

jobs:
  diagnostico:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python diagnostico.py
